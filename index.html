<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bean Bliss Café</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #faf7f2;
  color: #333;
}

/* ---------- NAVBAR ---------- */
nav {
  background: #3e2723;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav h2 {
  color: #fff;
}

nav a, nav button {
  color: #fff;
  margin-left: 15px;
  text-decoration: none;
  background: none;
  border: none;
  font-size: 1rem;
  cursor: pointer;
}

/* ---------- HERO ---------- */
header {
  height: 90vh;
  background: url("https://images.unsplash.com/photo-1495474472287-4d71bcdd2085") center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
}

.hero {
  animation: fadeIn 2s ease;
}

.hero h1 {
  font-size: 4rem;
}

.hero button {
  margin-top: 20px;
  padding: 12px 25px;
  background: #c49b63;
  border: none;
  color: white;
  font-size: 1rem;
  border-radius: 5px;
  cursor: pointer;
}

/* ---------- SECTIONS ---------- */
section {
  padding: 60px 10%;
}

h2 {
  text-align: center;
  margin-bottom: 30px;
}

/* ---------- MENU ---------- */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
}

.menu-card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  transition: transform 0.3s;
  animation: slideUp 1s ease;
}

.menu-card:hover {
  transform: scale(1.05);
}

.menu-card button {
  margin-top: 10px;
  background: #3e2723;
  color: white;
  border: none;
  padding: 8px 15px;
  cursor: pointer;
}

/* ---------- MODALS ---------- */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 30px;
  border-radius: 8px;
  width: 300px;
  animation: fadeIn 0.5s ease;
}

.modal-content input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

.modal-content button {
  width: 100%;
  padding: 10px;
  margin-top: 15px;
  background: #3e2723;
  color: white;
  border: none;
  cursor: pointer;
}

.close {
  float: right;
  cursor: pointer;
  font-weight: bold;
}

/* ---------- FOOTER ---------- */
footer {
  background: #3e2723;
  color: white;
  text-align: center;
  padding: 15px;
}

/* ---------- ANIMATIONS ---------- */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0;}
  to { transform: translateY(0); opacity: 1;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <h2>Bean Bliss ☕</h2>
  <div>
    <a href="#menu">Menu</a>
    <button onclick="openLogin()">Login</button>
  </div>
</nav>

<!-- HERO -->
<header>
  <div class="hero">
    <h1>Fresh Coffee, Cozy Vibes</h1>
    <p>Order your favorite brew now</p>
    <button onclick="alert('Online ordering coming soon!')">Order Now</button>
  </div>
</header>

<!-- MENU -->
<section id="menu">
<h2>Our Menu</h2>
<div class="menu">
  <div class="menu-card">
    <h3>Espresso</h3>
    <p>Strong & bold</p>
    <p>₹120</p>
    <button onclick="addToCart('Espresso')">Order</button>
  </div>
  <div class="menu-card">
    <h3>Cappuccino</h3>
    <p>Milk & foam</p>
    <p>₹180</p>
    <button onclick="addToCart('Cappuccino')">Order</button>
  </div>
  <div class="menu-card">
    <h3>Cold Brew</h3>
    <p>Smooth & chilled</p>
    <p>₹200</p>
    <button onclick="addToCart('Cold Brew')">Order</button>
  </div>
</div>
</section>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <span class="close" onclick="closeLogin()">×</span>
    <h3>Login</h3>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- FOOTER -->
<footer>
  © 2026 Bean Bliss Café
</footer>

<script>
function openLogin() {
  document.getElementById("loginModal").style.display = "flex";
}

function closeLogin() {
  document.getElementById("loginModal").style.display = "none";
}

function login() {
  alert("Login successful (demo)");
  closeLogin();
}

function addToCart(item) {
  alert(item + " added to cart ☕");
}
</script>

</body>
</html>
